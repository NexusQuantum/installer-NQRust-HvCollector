# Airgapped installation configuration for HV Collector
compose_project_name: hvcollector

# Docker images to bundle (pulled during airgapped binary build)
images:
  # Core HV Collector services (GHCR - requires authentication)
  - ghcr.io/nexusquantum/hypervisor-collector:latest
  - ghcr.io/nexusquantum/fluentd-hypervisor-collector:latest
  
  # Infrastructure (public images)
  - ghcr.io/nexusquantum/postgres-hypervisor-collector:latest
  - bitnami/kubectl:latest

# Platform architecture
platform: linux/amd64

# Compression level (1-9, higher = smaller but slower)
compression_level: 6

# Expected bundle size: ~2GB (vs 3-4GB for hvcollector stack)
